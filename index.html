<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa Romántica para María Fernanda</title>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: linear-gradient(to top, #ffe082, #fffde7);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
    }

    h1 {
        position: absolute;
        top: 20px;
        width: 100%;
        color: #e65100;
        font-size: 32px;
        z-index: 3;
        animation: fadeIn 2s ease-in-out;
    }

    #botonInicio {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 25px;
        font-size: 20px;
        border: none;
        border-radius: 12px;
        background-color: #fdd835;
        cursor: pointer;
        z-index: 4;
    }

    #cuenta {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 70px;
        color: #d84315;
        font-weight: bold;
        display: none;
        z-index: 4;
    }

    #mensaje {
        position: absolute;
        bottom: 25px;
        width: 100%;
        font-size: 22px;
        color: #bf360c;
        font-weight: bold;
        z-index: 3;
        display: none;
    }

    #foto {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        width: 240px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.4);
        display: none;
        z-index: 3;
        animation: aparecer 2s ease-in-out;
    }

    .flor {
        position: absolute;
        font-size: 28px;
        animation: caer linear infinite;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }

    @keyframes caer {
        0% { transform: translateY(-10vh); opacity: 1; }
        100% { transform: translateY(110vh); opacity: 0; }
    }

    @keyframes aparecer {
        from { opacity: 0; transform: translateX(-50%) scale(0.5); }
        to { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>
</head>
<body>

<h1>🌻 María Fernanda, tengo algo especial para ti 🌻</h1>

<button id="botonInicio">Presiona aquí 💛</button>

<div id="cuenta">10</div>

<canvas id="canvas"></canvas>

<img id="foto" src="foto.jpg" alt="Nuestra foto">

<div id="mensaje">
Cada flor representa lo mucho que te amo.💛🖤
</div>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const boton = document.getElementById("botonInicio");
const cuenta = document.getElementById("cuenta");
const mensaje = document.getElementById("mensaje");
const foto = document.getElementById("foto");
const musica = document.getElementById("musica");

let tiempo = 10;

boton.addEventListener("click", () => {
    boton.style.display = "none";
    cuenta.style.display = "block";
    musica.play().catch(()=>{});

    const intervalo = setInterval(() => {
        tiempo--;
        cuenta.innerHTML = tiempo;

        if (tiempo <= 0) {
            clearInterval(intervalo);
            cuenta.style.display = "none";
            iniciarAnimacion();
        }
    }, 1000);
});

// Flores cayendo
function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flor");
    flor.innerHTML = "🌻";

    flor.style.left = Math.random() * 100 + "vw";
    flor.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 6000);
}

setInterval(crearFlor, 300);

// Corazón con flores
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let puntos = [];
let progreso = 0;

function crearCorazon() {
    puntos = [];
    const escala = 12;
    const centroX = canvas.width / 2;
    const centroY = canvas.height / 2 - 50;

    for (let t = 0; t < Math.PI * 2; t += 0.05) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t)
                - 5 * Math.cos(2 * t)
                - 2 * Math.cos(3 * t)
                - Math.cos(4 * t);

        puntos.push({
            x: centroX + x * escala,
            y: centroY - y * escala
        });
    }
}

function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = "24px Arial";

    for (let i = 0; i < progreso; i++) {
        const p = puntos[i];
        ctx.fillText("🌻", p.x, p.y);
    }

    if (progreso < puntos.length) {
        progreso++;
        requestAnimationFrame(dibujar);
    } else {
        mostrarFinal();
    }
}

function iniciarAnimacion() {
    crearCorazon();
    dibujar();
}

function mostrarFinal() {
    foto.style.display = "block";
    mensaje.style.display = "block";
}
</script>

</body>
</html>
